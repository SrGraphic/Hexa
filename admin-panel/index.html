<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles-index.css">
    <title>HEXA - Software de Gestion</title>
</head>

<body>
    <!-- Header -->
    <header>
        <h1>HEXA - ADMIN PANEL</h1>
    </header>

    <!-- Login -->
    <div class="login-container">
        <form id="login-form">
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> USUARIO</label>
                <input type="email" id="usuario" name="usuario" required>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> CONTRASEÑA</label>
                <input type="password" id="codigo" name="codigo" required>
            </div>
            <button type="submit">Acceder</button>
        </form>
    </div>

    <script type="module" src="login-function.js"></script>
    <script src="https://kit.fontawesome.com/fbca715a88.js" crossorigin="anonymous"></script>
</body>

</html>
